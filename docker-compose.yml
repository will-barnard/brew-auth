services:
  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=brewauth
      - DB_USERNAME=brewauth
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_URL=${AUTH_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=brewauth
      - POSTGRES_USER=brewauth
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewauth"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
    name: brew-auth-postgres

networks:
  internal:
